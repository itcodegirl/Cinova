<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Cinova — Movie & TV Browser</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link rel="dns-prefetch" href="//api.themoviedb.org">
	<link rel="dns-prefetch" href="//image.tmdb.org">
	<link
		href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap"
		rel="stylesheet">
		<link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>
	<a class="skip-link" href="#mainContent">Skip to main content</a>

	<!-- ═══ CONFIG SETUP ═══ -->
	<div class="setup-overlay" id="setupOverlay">
		<div class="setup-box">
			<div class="setup-icon">C</div>
			<h1>Set up Cino<em style="color:var(--accent); font-style:italic;">va</em></h1>
			<p>Cinova now uses a local config file for TMDB access instead of pasting tokens in-app.</p>
			<div class="setup-steps">
				<p>1. Copy <code>config.example.js</code> to <code>config.local.js</code></p>
				<p>2. Add your TMDB Read Access Token in <code>window.CINOVA_CONFIG.tmdbReadAccessToken</code></p>
				<p>3. Reload the app to start browsing</p>
			</div>
			<div id="setupError" role="alert" aria-live="assertive" style="display:none; margin-top:-4px; margin-bottom: 12px; color: var(--accent); font-size: 13px;"></div>
			<div class="setup-actions">
				<button type="button" id="setupRetryBtn" class="setup-retry" data-action="retry-setup">Reload Configuration</button>
			</div>
		</div>
	</div>
<!-- ═══ NAV ═══ -->
	<nav aria-label="Primary">
		<a class="nav-logo" href="#" id="homeLink" aria-label="Go to home" data-action="go-home">
			<div class="nav-logo-icon">
				<svg viewBox="0 0 24 24">
					<path
						d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z" />
				</svg>
			</div>
			<span class="nav-logo-text">Cino<em>va</em></span>
		</a>

		<div class="nav-center">
			<form class="search-box" id="searchForm" role="search" aria-label="Search movies and TV shows">
				<svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
					stroke-width="2">
					<circle cx="11" cy="11" r="8" />
					<line x1="21" y1="21" x2="16.65" y2="16.65" />
				</svg>
				<label class="sr-only" for="searchInput">Search movies and TV shows</label>
				<input type="text" id="searchInput" placeholder="Search movies & TV shows..." aria-label="Search movies and TV shows">
				<button class="search-clear" id="searchClear" type="button" aria-label="Clear search" aria-hidden="true" disabled data-action="clear-search">✕</button>
			</form>
		</div>

		<div class="nav-tabs">
			<button class="nav-tab active" data-action="switch-type" data-type="movie" type="button" aria-pressed="true">Movies</button>
			<button class="nav-tab" data-action="switch-type" data-type="tv" type="button" aria-pressed="false">TV Shows</button>
		</div>

		<button class="nav-watchlist" type="button" aria-label="Open watchlist" data-action="show-watchlist">
			♥ Watchlist
			<span class="watchlist-count" id="watchlistCount" aria-live="polite" aria-atomic="true">0</span>
		</button>
	</nav>

	<!-- ═══ HERO ═══ -->
	<section class="hero" id="heroSection">
		<div class="hero-backdrop" id="heroBackdrop"></div>
		<div class="hero-content">
			<div class="hero-info" id="heroInfo"></div>
		</div>
	</section>

	<!-- ═══ MAIN ═══ -->
	<main id="mainContent" aria-live="polite" aria-busy="false"></main>

	<!-- ═══ MODAL ═══ -->
	<div class="modal-overlay" id="modalOverlay">
		<div class="modal" id="modalContent" role="dialog" aria-modal="true" aria-label="Title details" tabindex="-1"></div>
	</div>

	<script src="config.local.js" data-optional="true"></script>
	<script src="assets/js/app.js" defer></script>
</body>

</html>
